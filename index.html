<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowodoro</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="header--back">
        <h1 class="header--logo">Flowodoro</h1>
      </div>
      <div class="layout">
        <div class="layout__start">
          <h3 class="title-type">Welcome</h3>
          <div class="timer-shell">
            <input
              type="number"
              name="minutes"
              id="min-work-time"
              placeholder="20"
              value="20"
              min="0"
              maxlength="2"
            />
            :
            <input
              type="number"
              name="seconds"
              id="sec-work-time"
              placeholder="00"
              value="00"
              min="0"
              max="60"
              maxlength="2"
            />
          </div>
          <div class="controls">
            <div class="controls--btns">
              <button class="btn btn__change-time" data-value="5">
                +5 min
              </button>
              <button class="btn btn__change-time" data-value="10">
                +10 min
              </button>
              <button class="btn btn__change-time" data-value="30">
                +30 min
              </button>
            </div>
            <div class="controls--btns">
              <button class="btn btn__change-time" data-value="-5">
                -5 min
              </button>
              <button class="btn btn__change-time" data-value="-10">
                -10 min
              </button>
              <button class="btn btn__change-time" data-value="-30">
                -30 min
              </button>
            </div>
          </div>
          <button class="btn btn__options">Options</button>
          <button class="btn btn__start">Start</button>
        </div>
      </div>
    </div>
  </body>
</html>
